services:
  - type: web
    name: minecraft-bot
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: / # Changed from /health to match our code
    envVars:
      - key: MINECRAFT_HOST
        value: "gameplanet.aternos.me" # You can put the default here or set in dashboard
      - key: MINECRAFT_PORT
        value: "16548"
      - key: MINECRAFT_USERNAME
        value: "Placer"
      - key: MINECRAFT_VERSION
        value: "1.21.1"
      - key: MINECRAFT_AUTH
        value: "offline"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
